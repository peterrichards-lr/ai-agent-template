name: CI Quality Gate

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  quality-gate:
    name: Code & Documentation Quality Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: 'requirements-dev.txt'

      - name: Install Python Development Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Unit Test Suite
        run: |
          python -m pytest -v tests/

      - name: Verify Documentation Timestamps & Review Status
        run: |
          python scripts/check_docs_review.py --max-review-days 180 --max-update-days 180

      - name: Run Pre-Commit Quality Gate Hooks
        run: |
          pre-commit run --all-files
